name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            compiler: gcc
            cc: gcc-12
            cxx: g++-12
          - os: ubuntu-22.04
            compiler: clang
            cc: clang-15
            cxx: clang++-15
          - os: windows-2022
            compiler: msvc

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} / ${{ matrix.compiler }}

    steps:
      - uses: actions/checkout@v4

      # ── Windows: set up MSVC environment (cl.exe in PATH) ─────────────────
      - name: Setup MSVC Developer Environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # ── Linux: install compilers if not present ────────────────────────────
      - name: Install GCC-12
        if: runner.os == 'Linux' && matrix.compiler == 'gcc'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-12 g++-12

      - name: Install Clang-15
        if: runner.os == 'Linux' && matrix.compiler == 'clang'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y clang-15

      # ── Configure (Linux) ─────────────────────────────────────────────────
      - name: Configure (Linux)
        if: runner.os == 'Linux'
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release

      # ── Configure (Windows) ───────────────────────────────────────────────
      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --config Release --parallel

      # ── Test ──────────────────────────────────────────────────────────────
      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure --parallel 4
